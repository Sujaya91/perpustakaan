        /* Animasi Kustom & Transisi Halus */
        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }
        .animate-scan {
            animation: scan 2s infinite linear;
        }
        .line-glow {
            box-shadow: 0 0 10px 2px rgba(245, 158, 11, 0.8);
        }
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

                        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />

                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h3m-3 0h3m-3 10h3m-9-10h3m-3 0V7m0 3v3m0 0h3m-9 7h3m-3 0v3m0-3h3m2-10h2m-2 3h2m-10-14h4v4h-4V3zm0 14h4v4h-4v-4zm14 0h4v4h-4v-4zm0-14h4v4h-4V3z" />

                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z" />

                Check: (

                Filter: (
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />

                TrendingUp: (

                ),
                BookMarked: (
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />

            return icons[name] || (
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>

            );
        };

        // ==========================================
        // COMPONENT: SLEEK SVG HUMAN AVATAR GRAPHIC
        // ==========================================
        const UserAvatar = ({ gender, className = "w-10 h-10" }) => {
            const isFemale = gender === 'Perempuan';
            return (
                <div className={`flex-shrink-0 flex items-center justify-center rounded-xl bg-gradient-to-br shadow-inner text-white ${isFemale ? 'from-rose-400 via-pink-500 to-pink-600' : 'from-sky-400 via-blue-500 to-indigo-600'} ${className}`}>
                    <svg fill="currentColor" viewBox="0 0 24 24" className="w-3/5 h-3/5">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                    </svg>
                </div>
            );
        };

        // ==========================================
        // INISIALISASI DATABASE KOSONG (PRODUKSI)
        // ==========================================
        const INITIAL_BOOKS = [];
        const INITIAL_CATEGORIES = [];
        const INITIAL_MEMBERS = [];
        const INITIAL_VISITORS = [];
        const INITIAL_BORROWINGS = [];

        // ==========================================
        // CUSTOM HOOK: LOCAL STORAGE (PENYIMPANAN DATA)
        // ==========================================
        function useLocalStorage(key, initialValue) {
            const [value, setValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error("Gagal membaca dari localStorage", error);
                    return initialValue;
                }
            });

            useEffect(() => {
                try {
                    window.localStorage.setItem(key, JSON.stringify(value));
                } catch (error) {
                    console.error("Gagal menyimpan ke localStorage", error);
                }
            }, [key, value]);

            return [value, setValue];
        }

        function App() {
            // ==========================================
            // STATE MANAGEMENT
            // ==========================================
            const [theme, setTheme] = useLocalStorage('smartLib_theme', 'light');
            const [currentRole, setCurrentRole] = useState('Admin'); // Admin, Petugas, Guru, Siswa
            const [activeMenu, setActiveMenu] = useState('Dashboard');
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
            const [toast, setToast] = useState(null);
            
            // Custom Confirmation Modal
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
            const fileInputRef = useRef(null);

            // Excel import file state & selected class state
            const [importFile, setImportFile] = useState(null);
            const [importSelectedClass, setImportSelectedClass] = useState('');

            // Database State (Persisted via LocalStorage / Tersimpan Permanen)
            const [books, setBooks] = useLocalStorage('smartLib_books', INITIAL_BOOKS);
            const [categories, setCategories] = useLocalStorage('smartLib_categories', INITIAL_CATEGORIES);
            const [members, setMembers] = useLocalStorage('smartLib_members', INITIAL_MEMBERS);
            const [visitors, setVisitors] = useLocalStorage('smartLib_visitors', INITIAL_VISITORS);
            const [borrowings, setBorrowings] = useLocalStorage('smartLib_borrowings', INITIAL_BORROWINGS);
            const [settings, setSettings] = useLocalStorage('smartLib_settings', {
                schoolName: 'SMA Negeri 1 Harapan Bangsa',
                address: 'Jl. Pendidikan No. 1, Kota Cerdas',
                finePerDay: 2000,
                maxBorrowDays: 7,
                maxBorrowBooks: 3,
                classes: ['X-1', 'X-2', 'X-3', 'XI IPA 1', 'XI IPS 1', 'XI IPS 2', 'XII IPA 1', 'XII IPS 1'],
            });

            // Modal & Edit Form States
            const [modalType, setModalType] = useState(null); // 'addBook', 'editBook', 'addCategory', 'editCategory', 'addMember', 'editMember', 'addBorrow', 'scanQR', 'cardMember', 'importMemberExcel'
            const [selectedItem, setSelectedItem] = useState(null);
            const [searchGlobal, setSearchGlobal] = useState('');
            const [newClassInput, setNewClassInput] = useState('');

            // Searchable Dropdowns for Add Borrowing Modal
            const [memberSearch, setMemberSearch] = useState('');
            const [bookSearch, setBookSearch] = useState('');
            const [memberDropdownOpen, setMemberDropdownOpen] = useState(false);
            const [bookDropdownOpen, setBookDropdownOpen] = useState(false);

            // Form inputs
            const [bookForm, setBookForm] = useState({ id: '', code: '', title: '', author: '', publisher: '', year: '', isbn: '', category: 'Fiksi', shelf: 'Rak A1', stock: 1, coverColor: 'from-blue-500 to-teal-500' });
            const [categoryForm, setCategoryForm] = useState({ id: '', name: '', desc: '' });
            const [memberForm, setMemberForm] = useState({ id: '', name: '', nisn: '', grade: '', gender: 'Laki-laki', phone: '', address: '' });
            const [borrowForm, setBorrowForm] = useState({ memberId: '', bookId: '', borrowDate: new Date().toISOString().split('T')[0] });
            const [visitorInput, setVisitorInput] = useState({ memberId: '', name: '', grade: '', purpose: 'Membaca Buku' });

            // Realtime search filters per page
            const [searchBook, setSearchBook] = useState('');
            const [filterCategory, setFilterCategory] = useState('Semua');
            const [searchMember, setSearchMember] = useState('');

            // System Real Date
            const todayObj = new Date();
            const todayStr = todayObj.toISOString().split('T')[0];
            const displayDate = todayObj.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            // Dynamic Chart & Stats Data
            const last7Days = useMemo(() => {
                return Array.from({length: 7}, (_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - (6 - i));
                    const dayName = d.toLocaleDateString('id-ID', { weekday: 'short' });
                    const dateStr = d.toISOString().split('T')[0];
                    const count = visitors.filter(v => v.timestamp.startsWith(dateStr)).length;
                    return { day: dayName, visits: count, date: dateStr };
                });
            }, [visitors]);

            const topMembers = useMemo(() => {
                const memberCounts = {};
                borrowings.forEach(b => {
                    memberCounts[b.memberId] = (memberCounts[b.memberId] || 0) + 1;
                });
                return Object.entries(memberCounts)
                    .map(([id, count]) => {
                        const m = members.find(x => x.id === id);
                        return m ? { name: m.name, class: m.grade, count } : null;
                    })
                    .filter(Boolean)
                    .sort((a, b) => b.count - a.count)
                    .slice(0, 4);
            }, [borrowings, members]);

            const topClasses = useMemo(() => {
                const classCounts = {};
                visitors.forEach(v => {
                    if (v.grade && v.grade !== 'Tamu Umum' && v.grade !== 'Guru' && v.grade !== 'Staff') {
                        classCounts[v.grade] = (classCounts[v.grade] || 0) + 1;
                    }
                });
                const total = Object.values(classCounts).reduce((a,b) => a+b, 0) || 1;
                const colors = ['bg-blue-500', 'bg-emerald-500', 'bg-indigo-500', 'bg-amber-500'];
                return Object.entries(classCounts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 4)
                    .map(([className, visits], idx) => ({
                        className,
                        visits,
                        score: `${Math.round((visits/total)*100)}%`,
                        color: colors[idx % colors.length]
                    }));
            }, [visitors]);

            const topCategories = useMemo(() => {
                const catCounts = {};
                books.forEach(b => {
                    catCounts[b.category] = (catCounts[b.category] || 0) + 1;
                });
                const total = books.length || 1;
                return Object.entries(catCounts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 4)
                    .map(([name, count]) => ({
                        name,
                        percentage: Math.round((count/total)*100)
                    }));
            }, [books]);

            // Dark Mode Class Changer
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [theme]);

            // Synchronize searchable fields on open
            useEffect(() => {
                if (modalType === 'addBorrow') {
                    if (borrowForm.memberId) {
                        const m = members.find(x => x.id === borrowForm.memberId);
                        setMemberSearch(m ? `${m.id} - ${m.name} (${m.grade})` : '');
                    } else {
                        setMemberSearch('');
                    }
                    if (borrowForm.bookId) {
                        const b = books.find(x => x.id === borrowForm.bookId);
                        setBookSearch(b ? `${b.code} - ${b.title}` : '');
                    } else {
                        setBookSearch('');
                    }
                }
            }, [modalType, borrowForm.memberId, borrowForm.bookId, members, books]);

            // ==========================================
            // UTILITIES & HELPER FUNCTIONS
            // ==========================================
            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const toggleTheme = () => {
                setTheme(prev => prev === 'light' ? 'dark' : 'light');
                showToast(`Beralih ke Mode ${theme === 'light' ? 'Gelap' : 'Terang'}`, 'info');
            };

            const handleAddClass = () => {
                if (!newClassInput.trim()) return;
                if (settings.classes.includes(newClassInput.trim())) {
                    showToast('Kelas sudah ada di daftar!', 'warning');
                    return;
                }
                setSettings(prev => ({ ...prev, classes: [...prev.classes, newClassInput.trim()] }));
                setNewClassInput('');
                showToast('Kelas baru ditambahkan', 'success');
            };

            const handleDeleteClass = (clsToRemove) => {
                setSettings(prev => ({ ...prev, classes: prev.classes.filter(c => c !== clsToRemove) }));
                showToast('Kelas dihapus', 'info');
            };

            // Hitung Denda Otomatis Terlambat
            useEffect(() => {
                const updatedBorrowings = borrowings.map(b => {
                    if (b.status === 'Dipinjam' || b.status === 'Terlambat') {
                        const dueDateObj = new Date(b.dueDate);
                        const todayObj = new Date(todayStr);
                        if (todayObj > dueDateObj) {
                            const diffTime = Math.abs(todayObj - dueDateObj);
                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            const calculatedFine = diffDays * settings.finePerDay;
                            return { ...b, fine: calculatedFine, status: 'Terlambat' };
                        }
                    }
                    return b;
                });

                const hasChanges = JSON.stringify(updatedBorrowings) !== JSON.stringify(borrowings);
                if (hasChanges) {
                    setBorrowings(updatedBorrowings);
                }
            }, [settings.finePerDay]);

            // ==========================================
            // DATA OPERATIONS (CRUD)
            // ==========================================

            // Buku
            const handleSaveBook = (e) => {
                e.preventDefault();
                if (modalType === 'addBook') {
                    const newBook = {
                        ...bookForm,
                        id: `B${String(books.length + 1).padStart(3, '0')}`,
                        status: bookForm.stock > 0 ? 'Tersedia' : 'Habis',
                    };
                    setBooks([newBook, ...books]);
                    showToast('Buku berhasil ditambahkan!', 'success');
                } else {
                    setBooks(books.map(b => b.id === bookForm.id ? { ...bookForm, status: bookForm.stock > 0 ? 'Tersedia' : 'Habis' } : b));
                    showToast('Data buku berhasil diperbarui!', 'success');
                }
                setModalType(null);
            };

            const handleDeleteBook = (id) => {
                setConfirmDialog({
                    isOpen: true,
                    title: 'Hapus Data Buku',
                    message: 'Apakah Anda yakin ingin menghapus buku ini secara permanen? Data yang dihapus tidak dapat dikembalikan.',
                    onConfirm: () => {
                        setBooks(books.filter(b => b.id !== id));
                        showToast('Buku berhasil dihapus dari sistem', 'success');
                    }
                });
            };

            // Kategori
            const handleSaveCategory = (e) => {
                e.preventDefault();
                if (modalType === 'addCategory') {
                    const newCat = { ...categoryForm, id: `C${categories.length + 1}` };
                    setCategories([...categories, newCat]);
                    showToast('Kategori baru berhasil ditambahkan!', 'success');
                } else {
                    setCategories(categories.map(c => c.id === categoryForm.id ? categoryForm : c));
                    showToast('Kategori berhasil diperbarui!', 'success');
                }
                setModalType(null);
            };

            // Anggota
            const handleSaveMember = (e) => {
                e.preventDefault();
                if (modalType === 'addMember') {
                    const newMem = {
                        ...memberForm,
                        id: `M${String(members.length + 1).padStart(3, '0')}`,
                    };
                    setMembers([newMem, ...members]);
                    showToast('Anggota baru berhasil bergabung!', 'success');
                } else {
                    setMembers(members.map(m => m.id === memberForm.id ? memberForm : m));
                    showToast('Data anggota berhasil diperbarui!', 'success');
                }
                setModalType(null);
            };

            const handleDeleteMember = (id) => {
                setConfirmDialog({
                    isOpen: true,
                    title: 'Hapus Data Anggota',
                    message: 'Apakah Anda yakin ingin mencabut keanggotaan siswa/guru ini? Riwayat peminjaman mungkin akan terdampak.',
                    onConfirm: () => {
                        setMembers(members.filter(m => m.id !== id));
                        showToast('Data anggota berhasil dihapus', 'success');
                    }
                });
            };

            // Simpan / Pilih file Excel di dalam Modal
            const handleFileChange = (e) => {
                setImportFile(e.target.files[0]);
            };

            // Eksekusi PEMBACAAN DAN IMPORT EXCEL NYATA (SheetJS)
            const handleExecuteImport = () => {
                if (!importSelectedClass) {
                    showToast('Silakan pilih tujuan kelas terlebih dahulu!', 'warning');
                    return;
                }
                if (!importFile) {
                    showToast('Silakan pilih file Excel terlebih dahulu!', 'warning');
                    return;
                }

                showToast(`Sedang membaca dan menganalisis berkas ${importFile.name}...`, 'info');

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        // Konversi data SheetJS ke format JSON Array
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        
                        if (jsonData.length <= 1) {
                            showToast('File Excel kosong atau tidak memiliki baris data!', 'error');
                            return;
                        }

                        // Deteksi Header & Mapping Index Kolom secara dinamis
                        const headers = jsonData[0].map(h => String(h).trim().toLowerCase());
                        const nameIdx = headers.indexOf('nama');
                        const nisnIdx = headers.indexOf('nisn_nip');
                        const genderIdx = headers.indexOf('jenis_kelamin');
                        const phoneIdx = headers.indexOf('nomor_hp');
                        const addressIdx = headers.indexOf('alamat');

                        if (nameIdx === -1 || nisnIdx === -1) {
                            showToast('Format Kolom tidak sesuai! Pastikan memiliki header "Nama" dan "NISN_NIP".', 'error');
                            return;
                        }

                        let importedCount = 0;
                        let skippedCount = 0;
                        const newImportedMembers = [];

                        // Iterasi Baris Data Excel
                        for (let i = 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if (!row || row.length === 0) continue;

                            const namaValue = row[nameIdx] ? String(row[nameIdx]).trim() : '';
                            const nisnValue = row[nisnIdx] ? String(row[nisnIdx]).trim() : '';
                            
                            // Validasi kolom wajib
                            if (!namaValue || !nisnValue) {
                                skippedCount++;
                                continue;
                            }

                            // Validasi NISN Unik (anti duplikat)
                            const isNisnExists = members.some(m => m.nisn === nisnValue) || newImportedMembers.some(m => m.nisn === nisnValue);
                            if (isNisnExists) {
                                skippedCount++;
                                continue;
                            }

                            // Mapping field opsional
                            const genderValue = row[genderIdx] ? String(row[genderIdx]).trim() : 'Laki-laki';
                            const phoneValue = row[phoneIdx] ? String(row[phoneIdx]).trim() : '-';
                            const addressValue = row[addressIdx] ? String(row[addressIdx]).trim() : '-';

                            // Generate ID Anggota Otomatis secara sekuensial
                            const nextIdNumber = members.length + newImportedMembers.length + 1;
                            const generatedId = `M${String(nextIdNumber).padStart(3, '0')}`;

                            newImportedMembers.push({
                                id: generatedId,
                                name: namaValue,
                                nisn: nisnValue,
                                grade: importSelectedClass, // Otomatis mengisi kelas dari pilihan dropdown modal
                                gender: genderValue,
                                phone: phoneValue,
                                address: addressValue
                            });
                            importedCount++;
                        }

                        if (importedCount > 0) {
                            setMembers(prev => [...prev, ...newImportedMembers]);
                            showToast(`Berhasil mengimpor ${importedCount} data anggota ke kelas ${importSelectedClass}! (Skip: ${skippedCount} duplikat/invalid)`, 'success');
                        } else {
                            showToast('Tidak ada data baru yang berhasil diimpor (Data duplikat atau format tidak valid)', 'warning');
                        }

                        setModalType(null);
                        setImportFile(null);
                        setImportSelectedClass('');

                    } catch (err) {
                        console.error(err);
                        showToast('Gagal memproses berkas Excel. Pastikan berkas tidak terenkripsi atau rusak.', 'error');
                    }
                };

                reader.onerror = () => {
                    showToast('Gagal membaca berkas dari disk lokal.', 'error');
                };

                reader.readAsArrayBuffer(importFile);
            };

            // Tambah Peminjaman
            const handleSaveBorrowing = (e) => {
                e.preventDefault();
                const targetBook = books.find(b => b.id === borrowForm.bookId);
                const targetMember = members.find(m => m.id === borrowForm.memberId);

                if (!targetBook || !targetMember) {
                    showToast('Buku atau Anggota tidak terpilih!', 'error');
                    return;
                }

                if (targetBook.stock <= 0) {
                    showToast('Buku sedang habis/kosong!', 'warning');
                    return;
                }

                const borrowDateObj = new Date(borrowForm.borrowDate);
                const dueDateObj = new Date(borrowDateObj);
                dueDateObj.setDate(dueDateObj.getDate() + settings.maxBorrowDays);
                const dueDateStr = dueDateObj.toISOString().split('T')[0];

                const newBorrow = {
                    id: `T${String(borrowings.length + 1).padStart(3, '0')}`,
                    memberId: targetMember.id,
                    memberName: targetMember.name,
                    bookId: targetBook.id,
                    bookTitle: targetBook.title,
                    borrowDate: borrowForm.borrowDate,
                    dueDate: dueDateStr,
                    returnDate: '',
                    status: 'Dipinjam',
                    fine: 0
                };

                setBorrowings([newBorrow, ...borrowings]);
                setBooks(books.map(b => b.id === targetBook.id ? { ...b, stock: b.stock - 1 } : b));
                showToast('Peminjaman sukses dicatat!', 'success');
                setModalType(null);
            };

            // Proses Pengembalian Buku
            const handleReturnBook = (borrowId) => {
                const borrow = borrowings.find(b => b.id === borrowId);
                if (!borrow) return;

                setBorrowings(borrowings.map(b => {
                    if (b.id === borrowId) {
                        return {
                            ...b,
                            returnDate: todayStr,
                            status: 'Kembali'
                        };
                    }
                    return b;
                }));

                setBooks(books.map(b => b.id === borrow.bookId ? { ...b, stock: b.stock + 1 } : b));
                showToast(`Buku "${borrow.bookTitle}" telah dikembalikan.`, 'success');
            };

            // Buku Tamu Pengunjung (Dengan Fitur Auto Peminjaman / Redirect)
            const handleAddVisitor = (e) => {
                e.preventDefault();
                let name = visitorInput.name;
                let grade = visitorInput.grade;
                let matchMember = null;

                if (visitorInput.memberId) {
                    matchMember = members.find(m => m.id === visitorInput.memberId || m.nisn === visitorInput.memberId);
                    if (matchMember) {
                        name = matchMember.name;
                        grade = matchMember.grade;
                    } else {
                        showToast('ID Anggota / NISN tidak valid!', 'error');
                        return;
                    }
                }

                if (!name) {
                    showToast('Isi nama atau ID Anggota!', 'warning');
                    return;
                }

                const newVisitor = {
                    id: `V${String(visitors.length + 1).padStart(3, '0')}`,
                    memberId: visitorInput.memberId,
                    name,
                    grade,
                    purpose: visitorInput.purpose,
                    timestamp: `${todayStr} ${new Date().toTimeString().split(' ')[0].substring(0, 5)}`
                };

                setVisitors([newVisitor, ...visitors]);
                showToast(`Kunjungan Anda sebagai "${name}" berhasil dicatat!`, 'success');

                // OTOMATISASI KUNJUNGAN KE PEMINJAMAN / PENGEMBALIAN
                if (visitorInput.purpose === 'Meminjam Buku') {
                    if (matchMember) {
                        // Buka form peminjaman dan pilih anggota secara otomatis
                        setBorrowForm(prev => ({ 
                            ...prev, 
                            memberId: matchMember.id,
                            bookId: '', 
                            borrowDate: new Date().toISOString().split('T')[0]
                        }));
                        setActiveMenu('Peminjaman');
                        setModalType('addBorrow');
                        showToast(`Dialihkan ke Form Peminjaman untuk ${matchMember.name}`, 'info');
                    } else {
                        // Jika tamu umum, arahkan ke halaman peminjaman
                        setActiveMenu('Peminjaman');
                        setModalType('addBorrow');
                        showToast('Silakan pilih anggota terdaftar untuk memulai transaksi peminjaman.', 'info');
                    }
                } else if (visitorInput.purpose === 'Mengembalikan Buku') {
                    // Alihkan ke menu peminjaman untuk mencari transaksi pengembalian
                    setActiveMenu('Peminjaman');
                    showToast(`Membuka Riwayat Peminjaman. Cari nama "${name}" untuk melakukan pengembalian.`, 'info');
                }

                // Reset Form Input Buku Tamu
                setVisitorInput({ memberId: '', name: '', grade: '', purpose: 'Membaca Buku' });
            };

            // ==========================================
            // ISOLATED PRINT ENGINE (OTOMATIS PRINT KARTU SAJA)
            // ==========================================
            const triggerIsolatedPrint = (member) => {
                if (!member) return;
                
                // Buka window sementara (Pop-up print engine)
                const printWindow = window.open('', '_blank', 'width=850,height=600');
                if (!printWindow) {
                    showToast('Gagal membuka jendela cetak. Pastikan pop-up diizinkan di browser Anda.', 'error');
                    return;
                }

                // Desain kartu dengan visual inline SVG dan styling khusus print
                const isFemale = member.gender === 'Perempuan';
                const avatarGradient = isFemale ? 'from-rose-400 via-pink-500 to-pink-600' : 'from-sky-400 via-blue-500 to-indigo-600';

                printWindow.document.write(`
                    <html>
                    <head>
                        <title>Cetak Kartu - ${member.name}</title>
                        <script src="https://cdn.tailwindcss.com"><\/script>

                            @media print {
                                body {
                                    margin: 0;
                                    padding: 0;
                                    background: white;
                                    -webkit-print-color-adjust: exact !important;
                                    print-color-adjust: exact !important;
                                }
                                .no-print { display: none !important; }
                                .card-container {
                                    box-shadow: none !important;
                                    border: 1px solid #cbd5e1 !important;

                                    page-break-inside: avoid;

                            }
                        </style>
                    </head>
                    <body class="bg-slate-100 flex items-center justify-center min-h-screen p-6">

                            <!-- Glow effect -->
                            <div class="absolute top-0 right-0 w-44 h-44 bg-amber-500/10 rounded-full blur-2xl"></div>

                                        <svg fill="currentColor" viewBox="0 0 24 24" class="w-4 h-4">

                                        <svg fill="currentColor" viewBox="0 0 24 24" class="w-12 h-12 text-slate-800">
                                            <path d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h3m-3 0h3m-3 10h3m-9-10h3m-3 0V7m0 3v3m0 0h3m-9 7h3m-3 0v3m0-3h3m2-10h2m-2 3h2m-10-14h4v4h-4V3zm0 14h4v4h-4v-4zm14 0h4v4h-4v-4zm0-14h4v4h-4V3z" />

                printWindow.document.close();
                showToast(`Membuka sistem printer untuk ${member.name}...`, 'success');
            };

            // ==========================================
            // REAL DOWNLOAD EXCEL & PDF LOGIC
            // ==========================================

            const exportToExcel = (reportType) => {
                if (!window.XLSX) {
                    showToast('Pustaka pengolah Excel sedang memuat. Coba lagi dalam beberapa saat.', 'warning');
                    return;
                }

                let rawData = [];
                let fileName = '';

                if (reportType === 'Peminjaman') {
                    rawData = borrowings.map(b => ({
                        'Kode Transaksi': b.id,
                        'ID Anggota': b.memberId,
                        'Nama Anggota': b.memberName,
                        'Judul Buku': b.bookTitle,
                        'Tanggal Pinjam': b.borrowDate,
                        'Batas Kembali': b.dueDate,
                        'Tanggal Kembali': b.returnDate || 'Belum Kembali',
                        'Status': b.status,
                        'Denda (Rp)': b.fine
                    }));
                    fileName = 'Laporan_Peminjaman_Sirkulasi.xlsx';
                } else if (reportType === 'Pengunjung') {
                    rawData = visitors.map(v => ({
                        'ID Kunjungan': v.id,
                        'ID Anggota': v.memberId || 'Tamu Umum',
                        'Nama': v.name,
                        'Kelas/Jabatan': v.grade,
                        'Tujuan': v.purpose,
                        'Waktu Masuk': v.timestamp
                    }));
                    fileName = 'Laporan_Pengunjung_Harian.xlsx';
                } else if (reportType === 'Inventori') {
                    rawData = books.map(b => ({
                        'ID Buku': b.id,
                        'Kode Buku': b.code,
                        'Judul': b.title,
                        'Penulis': b.author,
                        'Penerbit': b.publisher,
                        'Tahun': b.year,
                        'ISBN': b.isbn,
                        'Lokasi Rak': b.shelf,
                        'Stok': b.stock,
                        'Status': b.stock > 0 ? 'Tersedia' : 'Habis'
                    }));
                    fileName = 'Laporan_Katalog_Inventori_Buku.xlsx';
                }

                const worksheet = window.XLSX.utils.json_to_sheet(rawData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, reportType);
                window.XLSX.writeFile(workbook, fileName);
                showToast(`Sukses mendownload ${fileName}`, 'success');
            };

            const exportToPDF = (reportType) => {
                if (!window.jspdf || !window.jspdf.jsPDF) {
                    showToast('Pustaka pengolah PDF sedang memuat. Coba lagi dalam beberapa saat.', 'warning');
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'pt', 'a4');

                // Judul PDF
                doc.setFontSize(18);
                doc.setTextColor(15, 23, 42); // Navy Blue
                doc.text(`SMART LIBRARY - LAPORAN ${reportType.toUpperCase()}`, 40, 45);
                
                doc.setFontSize(10);
                doc.setTextColor(100, 116, 139); // Gray Text
                doc.text(`Sekolah: ${settings.schoolName} | Tanggal Cetak: ${todayStr}`, 40, 65);

                let columns = [];
                let rows = [];

                if (reportType === 'Peminjaman') {
                    columns = ['Kode', 'ID Anggota', 'Nama Anggota', 'Judul Buku', 'Tgl Pinjam', 'Batas Kembali', 'Tgl Kembali', 'Status', 'Denda'];
                    rows = borrowings.map(b => [
                        b.id,
                        b.memberId,
                        b.memberName,
                        b.bookTitle,
                        b.borrowDate,
                        b.dueDate,
                        b.returnDate || 'Belum',
                        b.status,
                        `Rp ${b.fine.toLocaleString('id-ID')}`
                    ]);
                } else if (reportType === 'Pengunjung') {
                    columns = ['ID', 'ID Anggota', 'Nama Pengunjung', 'Kelas/Unit', 'Tujuan', 'Waktu Masuk'];
                    rows = visitors.map(v => [
                        v.id,
                        v.memberId || 'Tamu Umum',
                        v.name,
                        v.grade,
                        v.purpose,
                        v.timestamp
                    ]);
                } else if (reportType === 'Inventori') {
                    columns = ['Kode', 'Judul Buku', 'Penulis', 'Penerbit', 'Tahun', 'ISBN', 'Rak', 'Stok'];
                    rows = books.map(b => [
                        b.code,

                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">TAHUN TERBIT</label>
                                                            <input type="text" required value={bookForm.year} onChange={(e) => setBookForm({...bookForm, year: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">ISBN</label>
                                                            <input type="text" required value={bookForm.isbn} onChange={(e) => setBookForm({...bookForm, isbn: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">LOKASI RAK</label>
                                                            <input type="text" required value={bookForm.shelf} onChange={(e) => setBookForm({...bookForm, shelf: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">STOK</label>
                                                            <input type="number" required min="0" value={bookForm.stock} onChange={(e) => setBookForm({...bookForm, stock: Number(e.target.value)})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-end gap-2.5 pt-4 border-t border-slate-100 dark:border-slate-800">
                                                        <button type="button" onClick={() => setModalType(null)} className="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold">Batal</button>
                                                        <button type="submit" className="px-5 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs">Simpan Buku</button>
                                                    </div>
                                                </form>
                                            )}

                                            {/* Form Kategori */}
                                            {(modalType === 'addCategory' || modalType === 'editCategory') && (
                                                <form onSubmit={handleSaveCategory} className="space-y-4">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-400 mb-1">NAMA KATEGORI</label>
                                                        <input type="text" required value={categoryForm.name} onChange={(e) => setCategoryForm({...categoryForm, name: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-400 mb-1">DESKRIPSI KETERANGAN</label>
                                                        <textarea rows="3" required value={categoryForm.desc} onChange={(e) => setCategoryForm({...categoryForm, desc: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}></textarea>
                                                    </div>
                                                    <div className="flex justify-end gap-2.5 pt-4 border-t border-slate-100 dark:border-slate-800">
                                                        <button type="button" onClick={() => setModalType(null)} className="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold">Batal</button>
                                                        <button type="submit" className="px-5 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs">Simpan Kategori</button>
                                                    </div>
                                                </form>
                                            )}

                                            {/* Form Anggota */}
                                            {(modalType === 'addMember' || modalType === 'editMember') && (
                                                <form onSubmit={handleSaveMember} className="space-y-4">
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">NAMA ANGGOTA</label>
                                                            <input type="text" required value={memberForm.name} onChange={(e) => setMemberForm({...memberForm, name: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">NISN / NIP</label>
                                                            <input type="text" required value={memberForm.nisn} onChange={(e) => setMemberForm({...memberForm, nisn: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">KELAS / JABATAN</label>
                                                            <select required value={memberForm.grade} onChange={(e) => setMemberForm({...memberForm, grade: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}>
                                                                <option value="">-- Pilih Kelas --</option>
                                                                {settings.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                                                <option value="Guru">Guru</option>
                                                                <option value="Staff">Staff</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">JENIS KELAMIN</label>
                                                            <select value={memberForm.gender} onChange={(e) => setMemberForm({...memberForm, gender: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}>
                                                                <option>Laki-laki</option>
                                                                <option>Perempuan</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">NOMOR HP</label>
                                                            <input type="text" required value={memberForm.phone} onChange={(e) => setMemberForm({...memberForm, phone: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">ALAMAT TINGGAL</label>
                                                            <input type="text" required value={memberForm.address} onChange={(e) => setMemberForm({...memberForm, address: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-end gap-2.5 pt-4 border-t border-slate-100 dark:border-slate-800">
                                                        <button type="button" onClick={() => setModalType(null)} className="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold">Batal</button>
                                                        <button type="submit" className="px-5 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs">Simpan Anggota</button>
                                                    </div>
                                                </form>
                                            )}

                                            {/* Transaksi Peminjaman (Searchable Dropdown) */}
                                            {modalType === 'addBorrow' && (
                                                <form onSubmit={handleSaveBorrowing} className="space-y-4 pb-32">
                                                    {/* Searchable Dropdown - Anggota */}
                                                    <div className="relative">
                                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase">Pilih Anggota</label>
                                                        <div className="relative">
                                                            <input 
                                                                type="text"
                                                                placeholder="Ketik nama, ID, kelas, atau NISN..."
                                                                value={memberSearch}
                                                                onFocus={() => setMemberDropdownOpen(true)}
                                                                onBlur={() => setTimeout(() => setMemberDropdownOpen(false), 250)}
                                                                onChange={(e) => {
                                                                    setMemberSearch(e.target.value);
                                                                    setBorrowForm(prev => ({ ...prev, memberId: '' }));
                                                                    setMemberDropdownOpen(true);
                                                                }}
                                                                className={`w-full px-3 py-2.5 text-sm rounded-lg border focus:outline-none focus:ring-2 focus:ring-amber-500 ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}
                                                            />
                                                            {borrowForm.memberId && (
                                                                <button 
                                                                    type="button" 
                                                                    onClick={() => {
                                                                        setMemberSearch('');
                                                                        setBorrowForm(prev => ({ ...prev, memberId: '' }));
                                                                    }}
                                                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-rose-500"
                                                                >
                                                                    <Icon name="X" className="w-4 h-4" />
                                                                </button>
                                                            )}
                                                        </div>
                                                        
                                                        {memberDropdownOpen && (
                                                            <div className={`absolute left-0 right-0 mt-1 max-h-48 overflow-y-auto rounded-lg border shadow-xl z-50 scrollbar-thin ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-slate-200' : 'bg-white border-slate-200'}`}>
                                                                {filteredMemberOptions.length > 0 ? (
                                                                    filteredMemberOptions.map(m => (
                                                                        <div 
                                                                            key={m.id}
                                                                            onClick={() => {
                                                                                setBorrowForm(prev => ({ ...prev, memberId: m.id }));
                                                                                setMemberSearch(`${m.id} - ${m.name} (${m.grade})`);
                                                                                setMemberDropdownOpen(false);
                                                                            }}
                                                                            className={`px-3 py-2.5 text-sm cursor-pointer hover:bg-amber-500 hover:text-slate-950 flex justify-between items-center border-b last:border-b-0 dark:border-slate-700/50 ${borrowForm.memberId === m.id ? 'bg-amber-500/10 text-amber-500 font-bold' : ''}`}
                                                                        >
                                                                            <span>{m.id} - {m.name} ({m.grade})</span>
                                                                            <span className="text-xs opacity-60">NISN: {m.nisn}</span>
                                                                        </div>
                                                                    ))
                                                                ) : (
                                                                    <div className="px-3 py-2.5 text-sm text-slate-400 italic">Anggota tidak ditemukan</div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Searchable Dropdown - Buku */}
                                                    <div className="relative">
                                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase">Pilih Buku</label>
                                                        <div className="relative">
                                                            <input 
                                                                type="text"
                                                                placeholder="Ketik judul, penulis, kode, atau ISBN..."
                                                                value={bookSearch}
                                                                onFocus={() => setBookDropdownOpen(true)}
                                                                onBlur={() => setTimeout(() => setBookDropdownOpen(false), 250)}
                                                                onChange={(e) => {
                                                                    setBookSearch(e.target.value);
                                                                    setBorrowForm(prev => ({ ...prev, bookId: '' }));
                                                                    setBookDropdownOpen(true);
                                                                }}
                                                                className={`w-full px-3 py-2.5 text-sm rounded-lg border focus:outline-none focus:ring-2 focus:ring-amber-500 ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}
                                                            />
                                                            {borrowForm.bookId && (
                                                                <button 
                                                                    type="button" 
                                                                    onClick={() => {
                                                                        setBookSearch('');
                                                                        setBorrowForm(prev => ({ ...prev, bookId: '' }));
                                                                    }}
                                                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-rose-500"
                                                                >
                                                                    <Icon name="X" className="w-4 h-4" />
                                                                </button>
                                                            )}
                                                        </div>
                                                        
                                                        {bookDropdownOpen && (
                                                            <div className={`absolute left-0 right-0 mt-1 max-h-48 overflow-y-auto rounded-lg border shadow-xl z-50 scrollbar-thin ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-slate-200' : 'bg-white border-slate-200'}`}>
                                                                {filteredBookOptions.length > 0 ? (
                                                                    filteredBookOptions.map(b => (
                                                                        <div 
                                                                            key={b.id}
                                                                            onClick={() => {
                                                                                if (b.stock > 0) {
                                                                                    setBorrowForm(prev => ({ ...prev, bookId: b.id }));
                                                                                    setBookSearch(`${b.code} - ${b.title}`);
                                                                                    setBookDropdownOpen(false);
                                                                                }
                                                                            }}
                                                                            className={`px-3 py-2.5 text-sm flex justify-between items-center border-b last:border-b-0 dark:border-slate-700/50 ${b.stock > 0 ? 'cursor-pointer hover:bg-amber-500 hover:text-slate-950' : 'opacity-40 cursor-not-allowed'} ${borrowForm.bookId === b.id ? 'bg-amber-500/10 text-amber-500 font-bold' : ''}`}
                                                                        >
                                                                            <div>
                                                                                <span className="font-semibold block">{b.code} - {b.title}</span>
                                                                                <span className="text-xs text-slate-400">{b.author} | Rak: {b.shelf}</span>
                                                                            </div>
                                                                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${b.stock > 0 ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}`}>
                                                                                {b.stock > 0 ? `Stok: ${b.stock}` : 'Habis'}
                                                                            </span>
                                                                        </div>
                                                                    ))
                                                                ) : (
                                                                    <div className="px-3 py-2.5 text-sm text-slate-400 italic">Buku tidak ditemukan</div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Tanggal Peminjaman */}
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase">Tanggal Peminjaman</label>
                                                        <input type="date" required value={borrowForm.borrowDate} onChange={(e) => setBorrowForm({ ...borrowForm, borrowDate: e.target.value })} className={`w-full px-3 py-2.5 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                    </div>

                                                    <div className="flex justify-end gap-2.5 pt-4 border-t border-slate-100 dark:border-slate-800">
                                                        <button type="button" onClick={() => setModalType(null)} className="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold">Batal</button>
                                                        <button type="submit" className="px-5 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs">Proses Pinjam</button>
                                                    </div>
                                                </form>
                                            )}

                                            {/* Kartu Anggota */}
                                            {modalType === 'cardMember' && selectedItem && (
                                                <div className="space-y-6">
                                                    <div className="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-950 p-6 rounded-2xl text-white relative border border-slate-800 shadow-xl overflow-hidden aspect-[1.586/1] w-full max-w-[450px] mx-auto">
                                                        <div className="absolute top-0 right-0 w-44 h-44 bg-amber-500/10 rounded-full blur-2xl"></div>
                                                        <div className="flex justify-between items-start border-b border-white/10 pb-3">
                                                            <div className="flex items-center gap-2">
                                                                <Icon name="BookOpen" className="w-5 h-5 text-amber-500" />
                                                                <div>
                                                                    <p className="text-[10px] font-extrabold tracking-wider leading-none m-0">SMART SCHOOL LIBRARY</p>
                                                                    <p class="text-[8px] text-amber-400 mt-0.5 font-semibold leading-none">KARTU ANGGOTA DIGITAL</p>
                                                                </div>
                                                            </div>
                                                            <span className="text-[8px] bg-white/15 px-2 py-0.5 rounded-full font-bold">SMART-CARD</span>
                                                        </div>
                                                        <div className="flex gap-4 mt-4 items-center">
                                                            <UserAvatar gender={selectedItem.gender} className="w-20 h-20 rounded-xl" />
                                                            <div className="overflow-hidden flex-1">
                                                                <h4 className="font-extrabold text-base truncate text-amber-400 leading-tight">{selectedItem.name}</h4>
                                                                <table className="text-[10px] mt-1.5 w-full text-slate-300">
                                                                    <tbody>
                                                                        <tr>
                                                                            <td className="py-0.5 font-bold w-12 text-slate-400">NISN</td>
                                                                            <td>: {selectedItem.nisn}</td>
                                                                        </tr>
                                                                        <tr>
                                                                            <td className="py-0.5 font-bold text-slate-400">KELAS</td>
                                                                            <td>: {selectedItem.grade}</td>
                                                                        </tr>
                                                                        <tr>
                                                                            <td className="py-0.5 font-bold text-slate-400">EXPIRED</td>
                                                                            <td>: 31 Des 2026</td>
                                                                        </tr>
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                            <div className="bg-white p-2 rounded-lg flex-shrink-0 flex flex-col items-center gap-1 shadow-md">
                                                                <div className="w-16 h-16 bg-slate-200 flex items-center justify-center border border-slate-100">
                                                                    <Icon name="QrCode" className="w-14 h-14 text-slate-800" />
                                                                </div>
                                                                <span className="text-[7px] text-slate-800 font-bold">{selectedItem.id}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-end">
                                                        <button 
                                                            onClick={() => triggerIsolatedPrint(selectedItem)} 
                                                            className="px-5 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs flex items-center gap-1.5"
                                                        >
                                                            <Icon name="Printer" className="w-4 h-4" /> Cetak Kartu Fisik
                                                        </button>
                                                    </div>
                                                </div>
                                            )}

                                            {/* Scanner QR Code */}
                                            {modalType === 'scanQR' && (
                                                <div className="text-center py-6 space-y-4">
                                                    <div className="w-48 h-48 border-4 border-dashed border-amber-500 rounded-2xl mx-auto flex items-center justify-center relative overflow-hidden bg-slate-950/20">
                                                        <div className="w-full h-1 bg-amber-500 absolute animate-scan line-glow"></div>
                                                        <Icon name="QrCode" className="w-24 h-24 text-slate-400 opacity-60" />
                                                    </div>
                                                    <p className="text-xs text-slate-400 px-8">Kamera siap mendeteksi QR Code Kartu Anggota Digital atau Buku secara instan.</p>
                                                    <p className="text-[10px] text-amber-500 font-bold bg-amber-500/10 px-4 py-2 rounded-lg inline-block">Arahkan kursor ke kolom input lalu tekan tombol pada alat scanner Anda.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* CUSTOM CONFIRMATION DIALOG */}
                            {confirmDialog.isOpen && (
                                <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                                    <div className={`w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-zoomIn border ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
                                        <div className="flex gap-3 items-start">
                                            <div className="p-3 rounded-full bg-rose-500/10 text-rose-500 flex-shrink-0">
                                                <Icon name="AlertTriangle" className="w-6 h-6" />
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-lg">{confirmDialog.title}</h3>
                                                <p className="text-sm text-slate-500 dark:text-slate-400 mt-2 leading-relaxed">{confirmDialog.message}</p>
                                            </div>
                                        </div>
                                        <div className="flex justify-end gap-3 mt-6">
                                            <button onClick={() => setConfirmDialog({ ...confirmDialog, isOpen: false })} className="px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold text-slate-700 dark:text-slate-300">Batal</button>
                                            <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog({ ...confirmDialog, isOpen: false }); }} className="px-5 py-2.5 rounded-xl bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold shadow-lg shadow-rose-500/20">Ya, Hapus</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </main>

                    </div>

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
