            const todayStr = '2026-05-19';

            // Dark Mode Class Changer
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [theme]);

            // ==========================================
            // UTILITIES & HELPER FUNCTIONS
            // ==========================================
            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const toggleTheme = () => {
                setTheme(prev => prev === 'light' ? 'dark' : 'light');
                showToast(`Beralih ke Mode ${theme === 'light' ? 'Gelap' : 'Terang'}`, 'info');
            };

            const handleAddClass = () => {
                if (!newClassInput.trim()) return;
                if (settings.classes.includes(newClassInput.trim())) {
                    showToast('Kelas sudah ada di daftar!', 'warning');
                    return;
                }
                setSettings(prev => ({ ...prev, classes: [...prev.classes, newClassInput.trim()] }));
                setNewClassInput('');
                showToast('Kelas baru ditambahkan', 'success');
            };

            const handleDeleteClass = (clsToRemove) => {
                setSettings(prev => ({ ...prev, classes: prev.classes.filter(c => c !== clsToRemove) }));
                showToast('Kelas dihapus', 'info');
            };

            // Hitung Denda Otomatis Terlambat
            useEffect(() => {
                const updatedBorrowings = borrowings.map(b => {
                    if (b.status === 'Dipinjam' || b.status === 'Terlambat') {
                        const dueDateObj = new Date(b.dueDate);
                        const todayObj = new Date(todayStr);
                        if (todayObj > dueDateObj) {
                            const diffTime = Math.abs(todayObj - dueDateObj);
                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            const calculatedFine = diffDays * settings.finePerDay;
                            return { ...b, fine: calculatedFine, status: 'Terlambat' };
                        }
                    }
                    return b;
                });

                const hasChanges = JSON.stringify(updatedBorrowings) !== JSON.stringify(borrowings);
                if (hasChanges) {
                    setBorrowings(updatedBorrowings);
                }
            }, [settings.finePerDay]);

            // ==========================================
            // DATA OPERATIONS (CRUD)
            // ==========================================

            // Buku
            const handleSaveBook = (e) => {
                e.preventDefault();
                if (modalType === 'addBook') {
                    const newBook = {
                        ...bookForm,
                        id: `B${String(books.length + 1).padStart(3, '0')}`,
                        status: bookForm.stock > 0 ? 'Tersedia' : 'Habis',
                    };
                    setBooks([newBook, ...books]);
                    showToast('Buku berhasil ditambahkan!', 'success');
                } else {
                    setBooks(books.map(b => b.id === bookForm.id ? { ...bookForm, status: bookForm.stock > 0 ? 'Tersedia' : 'Habis' } : b));
                    showToast('Data buku berhasil diperbarui!', 'success');
                }
                setModalType(null);
            };

            const handleDeleteBook = (id) => {
                setConfirmDialog({
                    isOpen: true,
                    title: 'Hapus Data Buku',
                    message: 'Apakah Anda yakin ingin menghapus buku ini secara permanen? Data yang dihapus tidak dapat dikembalikan.',
                    onConfirm: () => {
                        setBooks(books.filter(b => b.id !== id));
                        showToast('Buku berhasil dihapus dari sistem', 'success');
                    }
                });
            };

            // Kategori
            const handleSaveCategory = (e) => {
                e.preventDefault();
                if (modalType === 'addCategory') {
                    const newCat = { ...categoryForm, id: `C${categories.length + 1}` };
                    setCategories([...categories, newCat]);
                    showToast('Kategori baru berhasil ditambahkan!', 'success');
                } else {
                    setCategories(categories.map(c => c.id === categoryForm.id ? categoryForm : c));
                    showToast('Kategori berhasil diperbarui!', 'success');
                }
                setModalType(null);
            };

            // Anggota
            const handleSaveMember = (e) => {
                e.preventDefault();
                if (modalType === 'addMember') {
                    const newMem = {
                        ...memberForm,
                        id: `M${String(members.length + 1).padStart(3, '0')}`,
                        photo: memberForm.photo || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=120&h=120&q=80'
                    };
                    setMembers([newMem, ...members]);
                    showToast('Anggota baru berhasil bergabung!', 'success');
                } else {
                    setMembers(members.map(m => m.id === memberForm.id ? memberForm : m));
                    showToast('Data anggota berhasil diperbarui!', 'success');
                }
                setModalType(null);
            };

            const handleDeleteMember = (id) => {
                setConfirmDialog({
                    isOpen: true,
                    title: 'Hapus Data Anggota',
                    message: 'Apakah Anda yakin ingin mencabut keanggotaan siswa/guru ini? Riwayat peminjaman mungkin akan terdampak.',
                    onConfirm: () => {
                        setMembers(members.filter(m => m.id !== id));
                        showToast('Data anggota berhasil dihapus', 'success');
                    }
                });
            };

            // Import Excel (Simulasi)
            const handleImportExcel = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                showToast(`Membaca file ${file.name}...`, 'info');
                
                setTimeout(() => {
                    const newMember1 = { id: `M${String(members.length + 1).padStart(3, '0')}`, name: 'Siswa Import Baru', nisn: '0088997766', grade: 'X-1', gender: 'Laki-laki', phone: '081122334455', address: 'Hasil Import Excel', photo: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=120&h=120&q=80' };
                    const newMember2 = { id: `M${String(members.length + 2).padStart(3, '0')}`, name: 'Siswi Import Baru', nisn: '0088997755', grade: 'X-2', gender: 'Perempuan', phone: '085544332211', address: 'Hasil Import Excel', photo: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=120&h=120&q=80' };
                    
                    setMembers(prev => [newMember1, newMember2, ...prev]);
                    showToast('Data excel berhasil diimpor!', 'success');
                    
                    if (fileInputRef.current) {
                        fileInputRef.current.value = '';
                    }
                }, 1500);
            };

            // Tambah Peminjaman
            const handleSaveBorrowing = (e) => {
                e.preventDefault();
                const targetBook = books.find(b => b.id === borrowForm.bookId);
                const targetMember = members.find(m => m.id === borrowForm.memberId);

                if (!targetBook || !targetMember) {
                    showToast('Buku atau Anggota tidak ditemukan!', 'error');
                    return;
                }

                if (targetBook.stock <= 0) {
                    showToast('Buku sedang habis/kosong!', 'warning');
                    return;
                }

                const borrowDateObj = new Date(borrowForm.borrowDate);
                const dueDateObj = new Date(borrowDateObj);
                dueDateObj.setDate(dueDateObj.getDate() + settings.maxBorrowDays);
                const dueDateStr = dueDateObj.toISOString().split('T')[0];

                const newBorrow = {
                    id: `T${String(borrowings.length + 1).padStart(3, '0')}`,
                    memberId: targetMember.id,
                    memberName: targetMember.name,
                    bookId: targetBook.id,
                    bookTitle: targetBook.title,
                    borrowDate: borrowForm.borrowDate,
                    dueDate: dueDateStr,
                    returnDate: '',
                    status: 'Dipinjam',
                    fine: 0
                };

                setBorrowings([newBorrow, ...borrowings]);
                setBooks(books.map(b => b.id === targetBook.id ? { ...b, stock: b.stock - 1 } : b));
                showToast('Peminjaman sukses dicatat!', 'success');
                setModalType(null);
            };

            // Proses Pengembalian Buku
            const handleReturnBook = (borrowId) => {
                const borrow = borrowings.find(b => b.id === borrowId);
                if (!borrow) return;

                setBorrowings(borrowings.map(b => {
                    if (b.id === borrowId) {
                        return {
                            ...b,
                            returnDate: todayStr,
                            status: 'Kembali'
                        };
                    }
                    return b;
                }));

                setBooks(books.map(b => b.id === borrow.bookId ? { ...b, stock: b.stock + 1 } : b));
                showToast(`Buku "${borrow.bookTitle}" telah dikembalikan.`, 'success');
            };

            // Buku Tamu Pengunjung
            const handleAddVisitor = (e) => {
                e.preventDefault();
                let name = visitorInput.name;
                let grade = visitorInput.grade;

                if (visitorInput.memberId) {
                    const match = members.find(m => m.id === visitorInput.memberId || m.nisn === visitorInput.memberId);
                    if (match) {
                        name = match.name;
                        grade = match.grade;
                    } else {
                        showToast('ID Anggota / NISN tidak valid!', 'error');
                        return;
                    }
                }

                if (!name) {
                    showToast('Isi nama atau ID Anggota!', 'warning');
                    return;
                }

                const newVisitor = {
                    id: `V${String(visitors.length + 1).padStart(3, '0')}`,
                    memberId: visitorInput.memberId,
                    name,
                    grade,
                    purpose: visitorInput.purpose,
                    timestamp: `${todayStr} ${new Date().toTimeString().split(' ')[0].substring(0, 5)}`
                };

                setVisitors([newVisitor, ...visitors]);
                setVisitorInput({ memberId: '', name: '', grade: '', purpose: 'Membaca Buku' });
                showToast('Kunjungan Anda berhasil dicatat!', 'success');
            };

            // ==========================================
            // REAL DOWNLOAD EXCEL & PDF LOGIC
            // ==========================================

            const exportToExcel = (reportType) => {
                if (!window.XLSX) {
                    showToast('Pustaka pengolah Excel sedang memuat. Coba lagi dalam beberapa saat.', 'warning');
                    return;
                }

                let rawData = [];
                let fileName = '';

                if (reportType === 'Peminjaman') {
                    rawData = borrowings.map(b => ({
                        'Kode Transaksi': b.id,
                        'ID Anggota': b.memberId,
                        'Nama Anggota': b.memberName,
                        'Judul Buku': b.bookTitle,
                        'Tanggal Pinjam': b.borrowDate,
                        'Batas Kembali': b.dueDate,
                        'Tanggal Kembali': b.returnDate || 'Belum Kembali',
                        'Status': b.status,
                        'Denda (Rp)': b.fine
                    }));
                    fileName = 'Laporan_Peminjaman_Sirkulasi.xlsx';
                } else if (reportType === 'Pengunjung') {
                    rawData = visitors.map(v => ({
                        'ID Kunjungan': v.id,
                        'ID Anggota': v.memberId || 'Tamu Umum',
                        'Nama': v.name,
                        'Kelas/Jabatan': v.grade,
                        'Tujuan': v.purpose,
                        'Waktu Masuk': v.timestamp
                    }));
                    fileName = 'Laporan_Pengunjung_Harian.xlsx';
                } else if (reportType === 'Inventori') {
                    rawData = books.map(b => ({
                        'ID Buku': b.id,
                        'Kode Buku': b.code,
                        'Judul': b.title,
                        'Penulis': b.author,
                        'Penerbit': b.publisher,
                        'Tahun': b.year,
                        'ISBN': b.isbn,
                        'Lokasi Rak': b.shelf,
                        'Stok': b.stock,
                        'Status': b.stock > 0 ? 'Tersedia' : 'Habis'
                    }));
                    fileName = 'Laporan_Katalog_Inventori_Buku.xlsx';
                }

                const worksheet = window.XLSX.utils.json_to_sheet(rawData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, reportType);
                window.XLSX.writeFile(workbook, fileName);
                showToast(`Sukses mendownload ${fileName}`, 'success');
            };

            const exportToPDF = (reportType) => {
                if (!window.jspdf || !window.jspdf.jsPDF) {
                    showToast('Pustaka pengolah PDF sedang memuat. Coba lagi dalam beberapa saat.', 'warning');
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'pt', 'a4');

                // Judul PDF
                doc.setFontSize(18);
                doc.setTextColor(15, 23, 42); // Navy Blue
                doc.text(`SMART LIBRARY - LAPORAN ${reportType.toUpperCase()}`, 40, 45);
                
                doc.setFontSize(10);
                doc.setTextColor(100, 116, 139); // Gray Text
                doc.text(`Sekolah: ${settings.schoolName} | Tanggal Cetak: ${todayStr}`, 40, 65);

                let columns = [];
                let rows = [];

                if (reportType === 'Peminjaman') {
                    columns = ['Kode', 'ID Anggota', 'Nama Anggota', 'Judul Buku', 'Tgl Pinjam', 'Batas Kembali', 'Tgl Kembali', 'Status', 'Denda'];
                    rows = borrowings.map(b => [
                        b.id,
                        b.memberId,
                        b.memberName,
                        b.bookTitle,
                        b.borrowDate,
                        b.dueDate,
                        b.returnDate || 'Belum',
                        b.status,
                        `Rp ${b.fine.toLocaleString('id-ID')}`
                    ]);
                } else if (reportType === 'Pengunjung') {
                    columns = ['ID', 'ID Anggota', 'Nama Pengunjung', 'Kelas/Unit', 'Tujuan', 'Waktu Masuk'];
                    rows = visitors.map(v => [
                        v.id,
                        v.memberId || 'Tamu Umum',
                        v.name,
                        v.grade,
                        v.purpose,
                        v.timestamp
                    ]);
                } else if (reportType === 'Inventori') {
                    columns = ['Kode', 'Judul Buku', 'Penulis', 'Penerbit', 'Tahun', 'ISBN', 'Rak', 'Stok'];
                    rows = books.map(b => [
                        b.code,
                        b.title,
                        b.author,
                        b.publisher,
                        b.year,
                        b.isbn,
                        b.shelf,
                        b.stock
                    ]);
                }

                doc.autoTable({
                    head: [columns],
                    body: rows,
                    startY: 85,
                    theme: 'grid',
                    headStyles: { fillColor: [15, 23, 42], textColor: [255, 255, 255] },
                    alternateRowStyles: { fillColor: [248, 250, 252] },
                    styles: { fontSize: 9, cellPadding: 8 }
                });

                doc.save(`Laporan_${reportType}_${todayStr}.pdf`);
                showToast(`Sukses mendownload Laporan_${reportType}.pdf`, 'success');
            };

            // Filter Buku
            const filteredBooks = useMemo(() => {
                return books.filter(b => {
                    const matchSearch = b.title.toLowerCase().includes(searchBook.toLowerCase()) || 
                                        b.author.toLowerCase().includes(searchBook.toLowerCase()) ||
                                        b.isbn.includes(searchBook);
                    const matchCategory = filterCategory === 'Semua' || b.category === filterCategory;
                    return matchSearch && matchCategory;
                });
            }, [books, searchBook, filterCategory]);

            // Filter Anggota
            const filteredMembers = useMemo(() => {
                return members.filter(m => 
                    m.name.toLowerCase().includes(searchMember.toLowerCase()) ||
                    m.nisn.includes(searchMember) ||
                    m.grade.toLowerCase().includes(searchMember.toLowerCase())
                );
            }, [members, searchMember]);

            // Statistik & Laporan Perhitungan
            const totalBooks = books.reduce((acc, curr) => acc + curr.stock, 0);
            const activeLoans = borrowings.filter(b => b.status === 'Dipinjam' || b.status === 'Terlambat').length;
            const lateLoans = borrowings.filter(b => b.status === 'Terlambat').length;
            const totalFines = borrowings.reduce((acc, curr) => acc + (curr.fine || 0), 0);

            const openEditBook = (book) => {
                setBookForm(book);
                setModalType('editBook');
            };

            const openAddBook = () => {
                setBookForm({ id: '', code: `BK-00${books.length + 1}`, title: '', author: '', publisher: '', year: '2025', isbn: '', category: 'Fiksi', shelf: 'Rak A1', stock: 5, coverColor: 'from-blue-600 to-indigo-700' });
                setModalType('addBook');
            };

            const openAddMember = () => {
                setMemberForm({ id: '', name: '', nisn: '', grade: settings.classes[0] || '', gender: 'Laki-laki', phone: '', address: '', photo: '' });
                setModalType('addMember');
            };

            const openEditMember = (member) => {
                setMemberForm(member);
                setModalType('editMember');
            };

            const showMemberCard = (member) => {
                setSelectedItem(member);
                setModalType('cardMember');
            };

            // Hak Akses Guard
            const hasAccess = (requiredRoles) => {
                return requiredRoles.includes(currentRole);
            };

            return (
                <div className={`min-h-screen font-sans transition-colors duration-300 ${theme === 'dark' ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
                    
                    {/* TOAST NOTIFICATION */}
                    {toast && (
                        <div className={`fixed top-5 right-5 z-50 flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl animate-bounce text-white font-semibold text-sm transition-all duration-300 ${
                            toast.type === 'success' ? 'bg-emerald-600 shadow-emerald-600/20' : 
                            toast.type === 'warning' ? 'bg-amber-500 shadow-amber-500/20' : 
                            toast.type === 'error' ? 'bg-rose-600 shadow-rose-600/20' : 
                            'bg-blue-600 shadow-blue-600/20'
                        }`}>
                            <Icon name={toast.type === 'success' ? 'Check' : toast.type === 'warning' ? 'AlertTriangle' : toast.type === 'error' ? 'X' : 'Info'} className="w-5 h-5 flex-shrink-0" />
                            <span>{toast.message}</span>
                        </div>
                    )}

                    <div className="flex h-screen overflow-hidden">
                        
                        {/* SIDEBAR MODERN (NAVY THEME) */}
                        <aside className={`bg-slate-900 text-slate-200 flex flex-col transition-all duration-300 z-30 relative border-r border-slate-800
                            ${sidebarCollapsed ? 'w-20' : 'w-72'}`}>
                            
                            {/* Brand/Logo */}
                            <div className="h-20 flex items-center justify-between px-6 border-b border-slate-800 bg-slate-950">
                                <div className="flex items-center gap-3 overflow-hidden">
                                    <div className="p-2.5 rounded-xl bg-amber-500 text-slate-950 shadow-lg shadow-amber-500/20 flex-shrink-0">
                                        <Icon name="BookOpen" className="w-6 h-6 font-bold" />
                                    </div>
                                    {!sidebarCollapsed && (
                                        <div className="whitespace-nowrap">
                                            <h1 className="font-extrabold text-base tracking-wider text-white">SMART LIBRARY</h1>
                                            <span className="text-[10px] text-amber-500 font-bold uppercase tracking-widest">Sistem Sekolah</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Navigation Menu */}
                            <nav className="flex-1 overflow-y-auto py-6 px-4 space-y-1.5 scrollbar-thin">
                                <div className={`px-3 mb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider ${sidebarCollapsed ? 'text-center' : ''}`}>
                                    {sidebarCollapsed ? '•' : 'Main Menu'}
                                </div>

                                {[
                                    { name: 'Dashboard', icon: 'BarChart2', roles: ['Admin', 'Petugas', 'Guru', 'Siswa'] },
                                    { name: 'Data Buku', icon: 'BookOpen', roles: ['Admin', 'Petugas', 'Guru', 'Siswa'] },
                                    { name: 'Kategori Buku', icon: 'BookMarked', roles: ['Admin', 'Petugas'] },
                                    { name: 'Data Anggota', icon: 'Users', roles: ['Admin', 'Petugas', 'Guru'] },
                                    { name: 'Pengunjung', icon: 'Award', roles: ['Admin', 'Petugas', 'Guru', 'Siswa'] },
                                    { name: 'Peminjaman', icon: 'ArrowLeftRight', roles: ['Admin', 'Petugas'] },
                                    { name: 'Laporan & Ekspor', icon: 'FileText', roles: ['Admin', 'Petugas', 'Guru'] },
                                    { name: 'Statistik Literasi', icon: 'TrendingUp', roles: ['Admin', 'Petugas', 'Guru', 'Siswa'] },
                                    { name: 'Pengaturan', icon: 'Settings', roles: ['Admin'] },
                                ].map((item) => {
                                    if (!hasAccess(item.roles)) return null;
                                    const isActive = activeMenu === item.name;
                                    return (
                                        <button
                                            key={item.name}
                                            onClick={() => setActiveMenu(item.name)}
                                            className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-medium transition-all duration-200 group relative
                                                ${isActive 
                                                    ? 'bg-amber-500 text-slate-950 shadow-lg shadow-amber-500/20 font-bold' 
                                                    : 'text-slate-400 hover:bg-slate-800/60 hover:text-white'}`}
                                        >
                                            <Icon name={item.icon} className={`w-5 h-5 flex-shrink-0 transition-transform group-hover:scale-110 ${isActive ? 'text-slate-950' : 'text-slate-400'}`} />
                                            {!sidebarCollapsed && <span className="truncate">{item.name}</span>}
                                            
                                            {/* Tooltip on collapse */}
                                            {sidebarCollapsed && (
                                                <div className="absolute left-24 bg-slate-950 text-white text-xs px-3 py-2 rounded-md opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity whitespace-nowrap shadow-xl border border-slate-800 z-50">
                                                    {item.name}
                                                </div>
                                            )}
                                        </button>
                                    );
                                })}
                            </nav>

                            {/* Role Switcher */}
                            <div className="p-4 border-t border-slate-800 bg-slate-950/60">
                                {!sidebarCollapsed && (
                                    <div className="mb-3">
                                        <label className="block text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-1">Pilih Hak Akses Simulator:</label>
                                        <div className="grid grid-cols-2 gap-1.5 text-xs">
                                            {['Admin', 'Petugas', 'Guru', 'Siswa'].map((r) => (
                                                <button
                                                    key={r}
                                                    onClick={() => {
                                                        setCurrentRole(r);
                                                        showToast(`Beralih ke peran: ${r}`, 'info');
                                                    }}
                                                    className={`py-1.5 px-2 rounded-lg font-medium transition-all duration-200 border
                                                        ${currentRole === r 
                                                            ? 'bg-slate-800 text-amber-500 border-amber-500/30' 
                                                            : 'bg-transparent text-slate-400 border-transparent hover:bg-slate-900'}`}
                                                >
                                                    {r}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-slate-800 border-2 border-amber-500/40 flex items-center justify-center font-bold text-amber-500">
                                        {currentRole[0]}
                                    </div>
                                    {!sidebarCollapsed && (
                                        <div className="overflow-hidden">
                                            <p className="text-sm font-bold text-white truncate">Pustakawan</p>
                                            <p className="text-xs text-amber-500 font-semibold flex items-center gap-1">
                                                <Icon name="Shield" className="w-3 h-3" /> {currentRole}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </aside>

                        {/* MAIN CONTENT AREA */}
                        <main className="flex-1 flex flex-col overflow-hidden">
                            
                            {/* TOPBAR */}
                            <header className={`h-20 border-b flex items-center justify-between px-8 z-20 backdrop-blur-md
                                ${theme === 'dark' ? 'bg-slate-950/80 border-slate-900' : 'bg-white/80 border-slate-200'}`}>
                                
                                <div className="flex items-center gap-4">
                                    <button 
                                        onClick={() => setSidebarCollapsed(!sidebarCollapsed)}
                                        className={`p-2 rounded-xl transition-colors ${theme === 'dark' ? 'hover:bg-slate-900 text-slate-400 hover:text-white' : 'hover:bg-slate-100 text-slate-600'}`}
                                    >
                                        <Icon name="Menu" className="w-6 h-6" />
                                    </button>
                                    
                                    <div className="relative max-w-xs md:max-w-md hidden sm:block">
                                        <Icon name="Search" className="w-5 h-5 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input 
                                            type="text" 
                                            placeholder="Cari buku, anggota, atau transaksi secara cepat..."
                                            value={searchGlobal}

                                                            value={newClassInput}
                                                            onChange={(e) => setNewClassInput(e.target.value)}
                                                            onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); handleAddClass(); } }}
                                                            className={`flex-1 px-3 py-2 text-sm rounded-lg border focus:outline-none focus:ring-2 focus:ring-amber-500 ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`}
                                                        />
                                                        <button type="button" onClick={handleAddClass} className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all">Tambah</button>
                                                    </div>

                                                    <div className="flex flex-wrap gap-2">
                                                        {settings.classes.map(cls => (
                                                            <div key={cls} className="flex items-center gap-1.5 bg-amber-500/10 text-amber-600 dark:text-amber-500 px-3 py-1.5 rounded-lg text-xs font-bold border border-amber-500/20">
                                                                {cls}
                                                                <button type="button" onClick={() => handleDeleteClass(cls)} className="hover:text-rose-500 transition-colors ml-1" title="Hapus Kelas">
                                                                    <Icon name="X" className="w-3.5 h-3.5" />
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="pt-4 border-t border-slate-100 dark:bg-slate-800 mt-6">
                                                    <button type="submit" className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-6 py-2.5 rounded-xl transition-all text-xs">Simpan Konfigurasi</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                )}

                            </div>

                            {/* MODAL POPUPS */}
                            {modalType && (
                                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                    <div className={`w-full max-w-xl rounded-2xl border shadow-2xl overflow-hidden ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
                                        <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                                            <h3 className="font-extrabold text-lg text-slate-800 dark:text-white">
                                                {modalType === 'addBook' && 'Tambah Buku Baru'}
                                                {modalType === 'editBook' && 'Edit Data Buku'}
                                                {modalType === 'addCategory' && 'Tambah Kategori'}
                                                {modalType === 'editCategory' && 'Edit Kategori'}
                                                {modalType === 'addMember' && 'Tambah Anggota Baru'}
                                                {modalType === 'editMember' && 'Edit Data Anggota'}
                                                {modalType === 'addBorrow' && 'Transaksi Peminjaman Baru'}
                                                {modalType === 'scanQR' && 'Simulasi Scanner QR Code'}
                                                {modalType === 'cardMember' && 'Kartu Anggota Perpustakaan'}
                                            </h3>
                                            <button onClick={() => setModalType(null)} className="text-slate-400 hover:text-rose-500"><Icon name="X" className="w-6 h-6" /></button>
                                        </div>

                                        <div className="p-6 max-h-[80vh] overflow-y-auto scrollbar-thin">
                                            {/* Form Buku */}
                                            {(modalType === 'addBook' || modalType === 'editBook') && (
                                                <form onSubmit={handleSaveBook} className="space-y-4">
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">KODE BUKU</label>
                                                            <input type="text" required value={bookForm.code} onChange={(e) => setBookForm({...bookForm, code: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">JUDUL BUKU</label>
                                                            <input type="text" required value={bookForm.title} onChange={(e) => setBookForm({...bookForm, title: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">PENULIS</label>
                                                            <input type="text" required value={bookForm.author} onChange={(e) => setBookForm({...bookForm, author: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">PENERBIT</label>
                                                            <input type="text" required value={bookForm.publisher} onChange={(e) => setBookForm({...bookForm, publisher: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">TAHUN TERBIT</label>
                                                            <input type="text" required value={bookForm.year} onChange={(e) => setBookForm({...bookForm, year: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">ISBN</label>
                                                            <input type="text" required value={bookForm.isbn} onChange={(e) => setBookForm({...bookForm, isbn: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">LOKASI RAK</label>
                                                            <input type="text" required value={bookForm.shelf} onChange={(e) => setBookForm({...bookForm, shelf: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">STOK</label>
                                                            <input type="number" required min="0" value={bookForm.stock} onChange={(e) => setBookForm({...bookForm, stock: Number(e.target.value)})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-end gap-2.5 pt-4 border-t border-slate-100 dark:border-slate-800">
                                                        <button type="button" onClick={() => setModalType(null)} className="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold">Batal</button>
                                                        <button type="submit" className="px-5 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs">Simpan Buku</button>
                                                    </div>
                                                </form>
                                            )}

                                            {/* Form Kategori */}
                                            {(modalType === 'addCategory' || modalType === 'editCategory') && (
                                                <form onSubmit={handleSaveCategory} className="space-y-4">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-400 mb-1">NAMA KATEGORI</label>
                                                        <input type="text" required value={categoryForm.name} onChange={(e) => setCategoryForm({...categoryForm, name: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-400 mb-1">DESKRIPSI KETERANGAN</label>
                                                        <textarea rows="3" required value={categoryForm.desc} onChange={(e) => setCategoryForm({...categoryForm, desc: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}></textarea>
                                                    </div>
                                                    <div className="flex justify-end gap-2.5 pt-4 border-t border-slate-100 dark:border-slate-800">
                                                        <button type="button" onClick={() => setModalType(null)} className="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold">Batal</button>
                                                        <button type="submit" className="px-5 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs">Simpan Kategori</button>
                                                    </div>
                                                </form>
                                            )}

                                            {/* Form Anggota */}
                                            {(modalType === 'addMember' || modalType === 'editMember') && (
                                                <form onSubmit={handleSaveMember} className="space-y-4">
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">NAMA ANGGOTA</label>
                                                            <input type="text" required value={memberForm.name} onChange={(e) => setMemberForm({...memberForm, name: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">NISN / NIP</label>
                                                            <input type="text" required value={memberForm.nisn} onChange={(e) => setMemberForm({...memberForm, nisn: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">KELAS / JABATAN</label>
                                                            <select required value={memberForm.grade} onChange={(e) => setMemberForm({...memberForm, grade: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}>
                                                                <option value="">-- Pilih Kelas --</option>
                                                                {settings.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                                                <option value="Guru">Guru</option>
                                                                <option value="Staff">Staff</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">JENIS KELAMIN</label>
                                                            <select value={memberForm.gender} onChange={(e) => setMemberForm({...memberForm, gender: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}>
                                                                <option>Laki-laki</option>
                                                                <option>Perempuan</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">NOMOR HP</label>
                                                            <input type="text" required value={memberForm.phone} onChange={(e) => setMemberForm({...memberForm, phone: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-slate-400 mb-1">ALAMAT TINGGAL</label>
                                                            <input type="text" required value={memberForm.address} onChange={(e) => setMemberForm({...memberForm, address: e.target.value})} className={`w-full px-3 py-2 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-end gap-2.5 pt-4 border-t border-slate-100 dark:border-slate-800">
                                                        <button type="button" onClick={() => setModalType(null)} className="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold">Batal</button>
                                                        <button type="submit" className="px-5 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs">Simpan Anggota</button>
                                                    </div>
                                                </form>
                                            )}

                                            {/* Transaksi Peminjaman */}
                                            {modalType === 'addBorrow' && (
                                                <form onSubmit={handleSaveBorrowing} className="space-y-4">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase">Pilih Anggota</label>
                                                        <select required value={borrowForm.memberId} onChange={(e) => setBorrowForm({ ...borrowForm, memberId: e.target.value })} className={`w-full px-3 py-2.5 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}>
                                                            <option value="">-- Pilih Anggota Peminjam --</option>
                                                            {members.map(m => (
                                                                <option key={m.id} value={m.id}>{m.id} - {m.name} ({m.grade})</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase">Pilih Buku</label>
                                                        <select required value={borrowForm.bookId} onChange={(e) => setBorrowForm({ ...borrowForm, bookId: e.target.value })} className={`w-full px-3 py-2.5 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`}>
                                                            <option value="">-- Pilih Buku --</option>
                                                            {books.map(b => (
                                                                <option key={b.id} value={b.id} disabled={b.stock <= 0}>
                                                                    {b.code} - {b.title} ({b.stock > 0 ? `Stok: ${b.stock}` : 'Habis/Dipinjam'})
                                                                </option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-400 mb-1.5 uppercase">Tanggal Peminjaman</label>
                                                        <input type="date" required value={borrowForm.borrowDate} onChange={(e) => setBorrowForm({ ...borrowForm, borrowDate: e.target.value })} className={`w-full px-3 py-2.5 text-sm rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50'}`} />
                                                    </div>
                                                    <div className="flex justify-end gap-2.5 pt-4 border-t border-slate-100 dark:border-slate-800">
                                                        <button type="button" onClick={() => setModalType(null)} className="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold">Batal</button>
                                                        <button type="submit" className="px-5 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs">Proses Pinjam</button>
                                                    </div>
                                                </form>
                                            )}

                                            {/* Kartu Anggota */}
                                            {modalType === 'cardMember' && selectedItem && (
                                                <div className="space-y-6">
                                                    <div className="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-950 p-6 rounded-2xl text-white relative border border-slate-800 shadow-xl overflow-hidden aspect-[1.586/1]">
                                                        <div className="absolute top-0 right-0 w-44 h-44 bg-amber-500/10 rounded-full blur-2xl"></div>
                                                        <div className="flex justify-between items-start border-b border-white/10 pb-3">
                                                            <div className="flex items-center gap-2">
                                                                <Icon name="BookOpen" className="w-5 h-5 text-amber-500" />
                                                                <div>
                                                                    <p className="text-[10px] font-extrabold tracking-wider">SMART SCHOOL LIBRARY</p>
                                                                    <p className="text-[8px] text-amber-400">KARTU ANGGOTA DIGITAL</p>
                                                                </div>
                                                            </div>
                                                            <span className="text-[8px] bg-white/15 px-2 py-0.5 rounded-full font-bold">SMART-CARD</span>
                                                        </div>
                                                        <div className="flex gap-4 mt-4 items-center">
                                                            <img src={selectedItem.photo} alt={selectedItem.name} className="w-20 h-20 rounded-xl object-cover border-2 border-amber-500/30" />
                                                            <div className="overflow-hidden flex-1">
                                                                <h4 className="font-extrabold text-base truncate text-amber-400">{selectedItem.name}</h4>
                                                                <table className="text-[10px] mt-1.5 w-full text-slate-300">
                                                                    <tbody>
                                                                        <tr>
                                                                            <td className="py-0.5 font-bold w-12">NISN</td>
                                                                            <td>: {selectedItem.nisn}</td>
                                                                        </tr>
                                                                        <tr>
                                                                            <td className="py-0.5 font-bold">KELAS</td>
                                                                            <td>: {selectedItem.grade}</td>
                                                                        </tr>
                                                                        <tr>
                                                                            <td className="py-0.5 font-bold">EXPIRED</td>
                                                                            <td>: 31 Des 2026</td>
                                                                        </tr>
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                            <div className="bg-white p-2 rounded-lg flex-shrink-0 flex flex-col items-center gap-1 shadow-md">
                                                                <div className="w-16 h-16 bg-slate-200 flex items-center justify-center border border-slate-100">
                                                                    <Icon name="QrCode" className="w-14 h-14 text-slate-800" />
                                                                </div>
                                                                <span className="text-[7px] text-slate-800 font-bold">{selectedItem.id}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-end">
                                                        <button onClick={() => window.print()} className="px-5 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs flex items-center gap-1.5">
                                                            <Icon name="Printer" className="w-4 h-4" /> Cetak Kartu Fisik
                                                        </button>
                                                    </div>
                                                </div>
                                            )}

                                            {/* Scanner QR Code */}
                                            {modalType === 'scanQR' && (
                                                <div className="text-center py-6 space-y-4">
                                                    <div className="w-48 h-48 border-4 border-dashed border-amber-500 rounded-2xl mx-auto flex items-center justify-center relative overflow-hidden bg-slate-950/20">
                                                        <div className="w-full h-1 bg-amber-500 absolute animate-scan line-glow"></div>
                                                        <Icon name="QrCode" className="w-24 h-24 text-slate-400 opacity-60" />
                                                    </div>
                                                    <p className="text-xs text-slate-400 px-8">Kamera siap mendeteksi QR Code Kartu Anggota Digital atau Buku secara instan.</p>
                                                    <div className="pt-4 border-t border-slate-100 dark:border-slate-800">
                                                        <button type="button" onClick={() => { setVisitorInput(prev => ({ ...prev, memberId: 'M001', name: 'Rian Hidayat', grade: 'XII IPA 1' })); setModalType(null); showToast('QR Code Anggota (M001) Berhasil Dipindai!', 'success'); }} className="px-5 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs">Simulasikan Scan (Anggota M001)</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* CUSTOM CONFIRMATION DIALOG */}
                            {confirmDialog.isOpen && (
                                <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                                    <div className={`w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-zoomIn border ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
                                        <div className="flex gap-3 items-start">
                                            <div className="p-3 rounded-full bg-rose-500/10 text-rose-500 flex-shrink-0">
                                                <Icon name="AlertTriangle" className="w-6 h-6" />
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-lg">{confirmDialog.title}</h3>
                                                <p className="text-sm text-slate-500 dark:text-slate-400 mt-2 leading-relaxed">{confirmDialog.message}</p>
                                            </div>
                                        </div>
                                        <div className="flex justify-end gap-3 mt-6">
                                            <button onClick={() => setConfirmDialog({ ...confirmDialog, isOpen: false })} className="px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-xs font-bold text-slate-700 dark:text-slate-300">Batal</button>
                                            <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog({ ...confirmDialog, isOpen: false }); }} className="px-5 py-2.5 rounded-xl bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold shadow-lg shadow-rose-500/20">Ya, Hapus</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </main>

                    </div>

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
